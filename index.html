  customRestInput: false,
  workoutNameAtStart: '',
};

// saved session history: array of { date, workoutName, exercises:[{name, sets:[{reps,type,kg,vestKg,dbKg}]}], duration, ts }
let sessionHistory = JSON.parse(localStorage.getItem('forge_sessions') || '[]');

const REST_OPTIONS = [30, 60, 120, 180, 300, 'custom'];

function saveSessionHistory(exercises, elapsed) {
  const dayData = getDayData();
  const record = {
    ts: Date.now(),
    date: new Date().toISOString().slice(0, 10),
    workoutName: dayData.workoutName || '',
    duration: elapsed,
    exercises: exercises.map((ex, ei) => ({
      name: ex.name,
      sets: (ex.sets || []).filter((_, si) => session.setsDone[`${ei}-${si}`])
        .map(s => ({ reps: s.reps, type: s.type || 'bw', kg: s.kg || '' }))
    })).filter(ex => ex.sets.length > 0)
  };
  sessionHistory.unshift(record);
  if (sessionHistory.length > 200) sessionHistory = sessionHistory.slice(0, 200);
  localStorage.setItem('forge_sessions', JSON.stringify(sessionHistory));
}

// Web Audio beep on rest end
function playRestDoneBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [0, 0.18, 0.36];
    times.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + t + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

function restOptLabel(s) {
  if (s === 'custom') return 'CUSTOM';
  if (s < 60) return s + 's';
  var mins = Math.floor(s / 60);
  var secs = s % 60;
  return secs > 0 ? mins + 'm ' + secs + 's' : mins + 'm';
}

function restOptOnclick(s) {
  if (s === 'custom') return "setRestDuration('custom')";
  return 'setRestDuration(' + s + ')';
}

function setRestLabelText(s) {
  if (s === 'custom' || typeof s !== 'number') return '';
  return restOptLabel(s);
}

function renderSessionPage() {
  const container = document.getElementById('sessionContent');
  const dayData = getDayData();
  const exercises = (dayData && !dayData.isRest && dayData.exercises) || [];

  if (!session.active && !session.complete) {
    if (exercises.length === 0) {
      container.innerHTML = '<div class="session-empty"><div class="session-empty-icon">🏋️</div>NO EXERCISES LOGGED TODAY<br>ADD SOME IN THE LOG TAB FIRST</div>';
      return;
    }
    const wName = dayData.workoutName ? '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);margin-bottom:14px">' + dayData.workoutName + '</div>' : '';
    const planRows = exercises.map(function(ex, i) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px">'
        + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:var(--muted2);min-width:22px">' + (i+1) + '</div>'
        + '<div style="flex:1;font-weight:600;font-size:14px">' + ex.name + '</div>'
        + '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted)">' + (ex.sets||[]).length + ' SETS</div>'
        + '</div>';
    }).join('');
    const restBtns = REST_OPTIONS.map(function(s) {
      return '<button class="rest-opt ' + (session.restDuration===s?'active':'') + '" onclick="' + restOptOnclick(s) + '">' + restOptLabel(s) + '</button>';
    }).join('');
    var customBlock = session.customRestInput
      ? '<div class="rest-custom-wrap">'
        + '<div class="rest-time-field"><label>MIN</label><input class="rest-time-input" id="customRestMins" type="number" inputmode="numeric" min="0" max="30" placeholder="0" style="width:80px"></div>'
        + '<div class="rest-time-sep">:</div>'
        + '<div class="rest-time-field"><label>SEC</label><input class="rest-time-input" id="customRestSecs" type="number" inputmode="numeric" min="0" max="59" placeholder="0" style="width:80px"></div>'
        + '<button class="rest-set-btn" onclick="applyCustomRest()">SET</button>'
        + '</div>'
      : '';
    container.innerHTML = wName
      + '<div class="section-label" style="margin-bottom:14px"><span>TODAY\'S PLAN</span><span style="color:var(--accent)">' + exercises.length + ' EXERCISE' + (exercises.length>1?'S':'') + '</span></div>'
      + planRows
      + '<div class="rest-picker" style="margin-top:18px"><span class="rest-picker-label">REST</span>' + restBtns + '</div>'
      + customBlock
      + '<button class="start-session-btn" onclick="startSession()">▶ START SESSION</button>';
    return;
  }

  if (session.complete) {
    const elapsed = session.startTs ? Math.floor((Date.now()-session.startTs)/1000) : 0;
    const doneCount = Object.keys(session.setsDone).length;
    const doneExercises = exercises.filter(function(ex, ei) {
      return (ex.sets||[]).some(function(_, si) { return session.setsDone[ei+'-'+si]; });
    });
    const wName = session.workoutNameAtStart || '';
    const exBlocks = doneExercises.map(function(ex) {
      const ei = exercises.indexOf(ex);
      const doneSets = (ex.sets||[]).filter(function(_, si) { return session.setsDone[ei+'-'+si]; });
      const setLines = doneSets.map(function(s, si) {
        const tl = s.type==='vest' ? (s.kg||0)+'kg Vest'
                 : s.type==='dumbbell' ? (s.kg||0)+'kg Dumbbells'
                 : s.type==='combo' ? (s.vestKg||0)+'kg Vest + '+(s.dbKg||0)+'kg Dumbbells = '+((parseFloat(s.vestKg)||0)+(parseFloat(s.dbKg)||0))+'kg'
                 : 'Bodyweight';
        return '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);padding:3px 0">SET '+(si+1)+' · '+(s.reps||'—')+' REPS · '+tl+'</div>';
      }).join('');
      return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px">'
        + '<div style="font-weight:600;font-size:13px;margin-bottom:6px">'+ex.name+'</div>'
        + setLines + '</div>';
    }).join('');
    container.innerHTML = '<div class="session-complete">'
      + '<div class="session-complete-icon">🔥</div>'
      + '<div class="session-complete-title">SESSION DONE</div>'
      + (wName ? '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:4px">'+wName+'</div>' : '')
      + '<div class="session-complete-sub">'+fmtTime(elapsed)+' TOTAL</div>'
      + '<div class="session-stats-row">'
      + '<div class="session-stat-box"><div class="val">'+doneExercises.length+'</div><div class="lbl">EXERCISES</div></div>'
      + '<div class="session-stat-box"><div class="val">'+doneCount+'</div><div class="lbl">SETS DONE</div></div>'
      + '<div class="session-stat-box"><div class="val">'+fmtTime(elapsed)+'</div><div class="lbl">DURATION</div></div>'
      + '</div>'
      + '<div style="text-align:left;margin-bottom:20px">'+exBlocks+'</div>'
      + '<button class="start-session-btn" onclick="resetSession()" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">CLOSE</button>'
      + '</div>';
    return;
  }

  // ── ACTIVE ──
  let currentEx = -1;
  for (let i = 0; i < exercises.length; i++) {
    const sets = exercises[i].sets || [];
    if (!sets.every(function(_,si){ return session.setsDone[i+'-'+si]; })) { currentEx = i; break; }
  }

  const restVisible = session.restRemaining > 0;
  const circumference = 2 * Math.PI * 24;
  const restFrac = restVisible ? session.restRemaining / session.restDuration : 1;
  const dashOffset = circumference * (1 - restFrac);
  const restLabel = session.restDuration < 60 ? session.restDuration+'s' : (session.restDuration/60)+'m';

  let nextInfo = '';
  if (restVisible && currentEx >= 0) {
    const ex = exercises[currentEx];
    const sets = ex.sets || [];
    const nextSetIdx = sets.findIndex(function(_,si){ return !session.setsDone[currentEx+'-'+si]; });
    if (nextSetIdx >= 0) {
      const s = sets[nextSetIdx];
      const tl = s.type==='vest'?(s.kg||0)+'kg Vest':s.type==='dumbbell'?(s.kg||0)+'kg Dumbbells':s.type==='combo'?(s.vestKg||0)+'kg Vest + '+(s.dbKg||0)+'kg Dumbbells':' Bodyweight';
      nextInfo = 'SET '+(nextSetIdx+1)+' · '+(s.reps||'—')+' REPS · '+tl;
    }
  }

  const restBtnsActive = REST_OPTIONS.map(function(s) {
    return '<button class="rest-opt '+(session.restDuration===s?'active':'')+'" style="padding:4px 3px;font-size:9px" onclick="'+restOptOnclick(s)+'">'+restOptLabel(s)+'</button>';
  }).join('');

  var customBlockActive = session.customRestInput
    ? '<div class="rest-custom-wrap" style="margin-top:6px">'
      + '<div class="rest-time-field"><label>MIN</label><input class="rest-time-input" id="customRestMins" type="number" inputmode="numeric" min="0" max="30" placeholder="0" style="width:64px;font-size:22px"></div>'
      + '<div class="rest-time-sep" style="font-size:22px;padding-top:16px">:</div>'
      + '<div class="rest-time-field"><label>SEC</label><input class="rest-time-input" id="customRestSecs" type="number" inputmode="numeric" min="0" max="59" placeholder="0" style="width:64px;font-size:22px"></div>'
      + '<button class="rest-set-btn" onclick="applyCustomRest()" style="font-size:10px;padding:8px 12px">SET</button>'
      + '</div>'
    : '';

  const exCards = exercises.map(function(ex, ei) {
    const sets = ex.sets || [];
    const allDone = sets.length > 0 && sets.every(function(_,si){ return session.setsDone[ei+'-'+si]; });
    const isCurrent = ei === currentEx;
    const doneSets = sets.filter(function(_,si){ return session.setsDone[ei+'-'+si]; }).length;

    const badge = allDone
      ? '<div class="live-ex-done-badge">✓ DONE</div>'
      : '<div class="live-ex-sets-badge">'+doneSets+'/'+sets.length+' SETS</div>';

    let setsBody = '';
    if (isCurrent || allDone) {
      const setRows = sets.map(function(s, si) {
        const done = !!session.setsDone[ei+'-'+si];
        const tl = s.type==='vest'?(s.kg||0)+'kg Vest':s.type==='dumbbell'?(s.kg||0)+'kg Dumbbells':s.type==='combo'?(s.vestKg||0)+'kg Vest + '+(s.dbKg||0)+'kg Dumbbells = '+((parseFloat(s.vestKg)||0)+(parseFloat(s.dbKg)||0))+'kg':' Bodyweight';
        const repsLabel = s.reps ? '<span>'+s.reps+' reps</span>' : '<span>— reps</span>';
        return '<div class="live-set-row">'
          + '<div class="live-set-num">'+(si+1)+'</div>'
          + '<div class="live-set-info">'+repsLabel+' · '+tl+'</div>'
          + '<button class="live-done-btn '+(done?'set-done':'')+'" onclick="markSetDone('+ei+','+si+')">'+(done?'✓':'DONE')+'</button>'
          + '</div>';
      }).join('');
      setsBody = '<div class="live-sets-body">'+setRows+'</div>';
    }

    return '<div class="live-ex-card '+(isCurrent?'current':'')+' '+(allDone?'done-card':'')+'">'
      + '<div class="live-ex-header">'
      + '<div class="live-ex-num">'+(ei+1)+'</div>'
      + '<div class="live-ex-name">'+ex.name+'</div>'
      + badge
      + '</div>'
      + setsBody
      + '</div>';
  }).join('');

  container.innerHTML = '<div class="session-topbar">'
    + '<div><div class="session-elapsed-label">ELAPSED</div><div class="session-elapsed" id="sessionElapsed">00:00</div></div>'
    + '<div style="margin-left:6px;flex:1"><div class="session-elapsed-label" id="restLabel">REST · '+restLabel+'</div>'
    + '<div class="rest-picker" id="restPicker" style="margin:4px 0 0;gap:3px">'+restBtnsActive+'</div>'
    + '<div id="restCustomBlock">'+customBlockActive+'</div></div>'
    + '<button class="session-end-btn" onclick="endSession()">END</button>'
    + '</div>'
    + '<div class="rest-timer-bar '+(restVisible?'visible':'')+'" id="restTimerBar">'
    + '<div class="rest-ring-wrap"><svg viewBox="0 0 56 56" width="56" height="56">'
    + '<circle class="rest-ring-bg" cx="28" cy="28" r="24"/>'
    + '<circle class="rest-ring-fg" id="restRingFg" cx="28" cy="28" r="24" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+dashOffset+'"/>'
    + '</svg><div class="rest-ring-num" id="restRingNum">'+session.restRemaining+'</div></div>'
    + '<div class="rest-timer-info"><div class="rest-timer-label">REST · NEXT UP</div>'
    + '<div class="rest-timer-next">'+(exercises[currentEx]?exercises[currentEx].name:'')+'</div>'
    + '<div class="rest-timer-sub">'+nextInfo+'</div></div>'
    + '<button class="rest-skip-btn" onclick="skipRest()">SKIP ›</button>'
    + '</div>'
    + exCards;

  updateElapsedDisplay();
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2,'0');
  const s = (secs % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function updateElapsedDisplay() {
  const el = document.getElementById('sessionElapsed');
  if (el && session.startTs) el.textContent = fmtTime(Math.floor((Date.now()-session.startTs)/1000));
}

function startSession() {
  const dayData = getDayData();
  session.active = true;
  session.complete = false;
  session.startTs = Date.now();
  session.setsDone = {};
  session.restRemaining = 0;
  session.workoutNameAtStart = dayData.workoutName || '';
  clearInterval(session.elapsedTimer);
  session.elapsedTimer = setInterval(() => updateElapsedDisplay(), 1000);
  renderSessionPage();
}

function setRestDuration(s) {
  if (s === 'custom') {
    session.customRestInput = true;
    var cb = document.getElementById('restCustomBlock');
    if (cb) {
      cb.innerHTML = '<div class="rest-custom-wrap" style="margin-top:6px">'
        + '<div class="rest-time-field"><label>MIN</label>'
        + '<input class="rest-time-input" id="customRestMins" type="number" inputmode="numeric" min="0" max="30" placeholder="0" style="width:64px;font-size:22px"></div>'
        + '<div class="rest-time-sep" style="font-size:22px;padding-top:18px">:</div>'
        + '<div class="rest-time-field"><label>SEC</label>'
        + '<input class="rest-time-input" id="customRestSecs" type="number" inputmode="numeric" min="0" max="59" placeholder="0" style="width:64px;font-size:22px"></div>'
        + '<button class="rest-set-btn" onclick="applyCustomRest()" style="font-size:10px;padding:8px 12px">SET</button>'
        + '</div>';
    } else {
      renderSessionPage();
    }
    return;
  }

  session.customRestInput = false;

  // If a rest timer is currently running, queue for next rest
  if (session.restRemaining > 0) {
    session.pendingRestDuration = s;
    var lbl = document.getElementById('restLabel');
    if (lbl) lbl.textContent = 'REST · ' + restOptLabel(s) + ' (next)';
    var cb = document.getElementById('restCustomBlock');
    if (cb) cb.innerHTML = '';
    // update highlights to show pending
    var picker = document.getElementById('restPicker');
    if (picker) {
      picker.querySelectorAll('.rest-opt').forEach(function(btn) {
        btn.classList.remove('active');
        if (btn.textContent.trim() === restOptLabel(s)) btn.classList.add('active');
      });
    }
    return;
  }

  session.restDuration = s;
  session.pendingRestDuration = null;

  var picker = document.getElementById('restPicker');
  var lbl = document.getElementById('restLabel');
  var cb = document.getElementById('restCustomBlock');
  if (picker) {
    picker.querySelectorAll('.rest-opt').forEach(function(btn) {
      btn.classList.remove('active');
      if (btn.textContent.trim() === restOptLabel(s)) btn.classList.add('active');
    });
    if (lbl) lbl.textContent = 'REST · ' + restOptLabel(s);
    if (cb) cb.innerHTML = '';
  } else {
    renderSessionPage();
  }
}

function applyCustomRest() {
  var minsEl = document.getElementById('customRestMins');
  var secsEl = document.getElementById('customRestSecs');
  var mins = parseInt(minsEl ? minsEl.value : 0) || 0;
  var secs = parseInt(secsEl ? secsEl.value : 0) || 0;
  var total = (mins * 60) + secs;
  if (total < 1) return;

  var rl = mins > 0 && secs > 0 ? mins + 'm ' + secs + 's'
         : mins > 0 ? mins + 'm'
         : secs + 's';

  session.customRestInput = false;

  if (session.restRemaining > 0) {
    session.pendingRestDuration = total;
    var lbl = document.getElementById('restLabel');
    if (lbl) lbl.textContent = 'REST · ' + rl + ' (next)';
    var cb = document.getElementById('restCustomBlock');
    if (cb) cb.innerHTML = '';
    return;
  }

  session.restDuration = total;
  session.pendingRestDuration = null;

  var lbl = document.getElementById('restLabel');
  var cb = document.getElementById('restCustomBlock');
  var picker = document.getElementById('restPicker');
  if (lbl) lbl.textContent = 'REST · ' + rl;
  if (cb) cb.innerHTML = '';
  if (picker) {
    picker.querySelectorAll('.rest-opt').forEach(function(btn) {
      btn.classList.remove('active');
    });
  }
}

function markSetDone(ei, si) {
  const key = `${ei}-${si}`;
  if (session.setsDone[key]) return;
  session.setsDone[key] = true;

  const dayData = getDayData();
  const exercises = dayData.exercises || [];

  const allDone = exercises.every((e,i) => (e.sets||[]).every((_,s) => session.setsDone[`${i}-${s}`]));

  if (allDone) {
    clearInterval(session.elapsedTimer);
    clearInterval(session.restTimer);
    session.restRemaining = 0;
    session.active = false;
    session.complete = true;
    const elapsed = Math.floor((Date.now()-session.startTs)/1000);
    saveSessionHistory(exercises, elapsed);
    renderSessionPage();
    return;
  }

  startRestTimer();
  renderSessionPage();
}

function startRestTimer() {
  clearInterval(session.restTimer);
  session.restRemaining = session.restDuration;

  session.restTimer = setInterval(() => {
    session.restRemaining--;

    if (session.restRemaining <= 0) {
      clearInterval(session.restTimer);
      session.restRemaining = 0;
      // Apply any pending rest duration change
      if (session.pendingRestDuration !== null) {
        session.restDuration = session.pendingRestDuration;
        session.pendingRestDuration = null;
        var lbl = document.getElementById('restLabel');
        if (lbl) lbl.textContent = 'REST · ' + restOptLabel(session.restDuration);
      }
      playRestDoneBeep();
    }

    const bar = document.getElementById('restTimerBar');
    const ring = document.getElementById('restRingFg');
    const num = document.getElementById('restRingNum');
    if (bar && ring && num) {
      const circ = 2 * Math.PI * 24;
      const frac = session.restDuration > 0 ? session.restRemaining / session.restDuration : 0;
      ring.style.strokeDashoffset = circ * (1 - frac);
      num.textContent = session.restRemaining;
      if (session.restRemaining <= 0) bar.classList.remove('visible');
    }
    updateElapsedDisplay();
  }, 1000);
}

function skipRest() {
  clearInterval(session.restTimer);
  session.restRemaining = 0;
  if (session.pendingRestDuration !== null) {
    session.restDuration = session.pendingRestDuration;
    session.pendingRestDuration = null;
  }
  renderSessionPage();
}

function endSession() {
  clearInterval(session.elapsedTimer);
  clearInterval(session.restTimer);
  const dayData = getDayData();
  const exercises = dayData.exercises || [];
  const elapsed = session.startTs ? Math.floor((Date.now()-session.startTs)/1000) : 0;
  // Only save if at least one set was done
  if (Object.keys(session.setsDone).length > 0) saveSessionHistory(exercises, elapsed);
  session.active = false;
  session.complete = true;
  renderSessionPage();
}

function resetSession() {
  clearInterval(session.elapsedTimer);
  clearInterval(session.restTimer);
  const prev = session.restDuration;
  session = { active:false, startTs:null, elapsedTimer:null, restTimer:null, restDuration:prev, restRemaining:0, pendingRestDuration:null, setsDone:{}, complete:false, customRestInput:false, workoutNameAtStart:'' };
  renderSessionPage();
}

// ─── DRAG TO REORDER ─────────────────────────────────────────────────────────
let dragSrcIdx = null;

function dragStart(e) {
  dragSrcIdx = parseInt(e.currentTarget.dataset.ei);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcIdx);
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.currentTarget;
  document.querySelectorAll('.exercise-card').forEach(function(c) { c.classList.remove('drag-over'); });
  if (parseInt(card.dataset.ei) !== dragSrcIdx) card.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dragDrop(e) {
  e.preventDefault();
  const targetIdx = parseInt(e.currentTarget.dataset.ei);
  if (dragSrcIdx === null || targetIdx === dragSrcIdx) return;
  const dayData = getDayData();
  const exs = dayData.exercises;
  const moved = exs.splice(dragSrcIdx, 1)[0];
  exs.splice(targetIdx, 0, moved);
  save();
  renderDayContent();
}

function dragEnd(e) {
  dragSrcIdx = null;
  document.querySelectorAll('.exercise-card').forEach(function(c) {
    c.classList.remove('dragging');
    c.classList.remove('drag-over');
  });
}

// ─── PAGE SWITCHING ───────────────────────────────────────────────────────────
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  document.body.classList.toggle('session-active', name === 'session');

  if (name === 'stats') renderStats();
  if (name === 'progress') renderProgress();
  if (name === 'session') renderSessionPage();
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
<!-- Confirm Delete Modal -->
<div class="confirm-modal-overlay" id="confirmModal">
  <div class="confirm-modal">
    <div class="confirm-modal-title">ARE YOU SURE?</div>
    <div class="confirm-modal-msg" id="confirmModalMsg"></div>
    <div class="confirm-modal-btns">
      <button class="confirm-cancel-btn" onclick="closeConfirmModal()">CANCEL</button>
      <button class="confirm-delete-btn" id="confirmDeleteBtn">DELETE</button>
    </div>
  </div>
</div>

</body>
