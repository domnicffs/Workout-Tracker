<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FORGE — Workout Tracker</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/domnicffs/Workout-Tracker/main/icon.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/domnicffs/Workout-Tracker/main/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --red: #ff4444;
    --green: #47ff8a;
    --blue: #47b4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Hide main header on session page */
  body.session-active .header { display: none; }
  body.session-active #page-session { padding-top: 20px; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; display: block; letter-spacing: 2px; margin-top: 2px; }

  /* Nav */
  .nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    letter-spacing: 1px;
  }

  .nav-btn svg { width: 20px; height: 20px; }

  .nav-btn.active { color: var(--accent); }

  /* Pages */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  .week-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }

  .day-pill {
    flex: 1;
    padding: 10px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }

  .day-pill .day-name { font-size: 9px; color: var(--muted); letter-spacing: 1px; }
  .day-pill .day-num { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .day-pill .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted2); margin: 4px auto 0; }
  .day-pill.has-workout .dot { background: var(--accent); }
  .day-pill.active { border-color: var(--accent); background: rgba(232,255,71,0.06); }
  .day-pill.active .day-num { color: var(--accent); }

  /* Section heading */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Exercise card */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ex-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
  }

  .ex-name {
    flex: 1;
    font-weight: 600;
    font-size: 14px;
  }

  .ex-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 0 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }

  .badge-bw { background: rgba(71,180,255,0.15); color: var(--blue); }
  .badge-vest { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .badge-dumbbell { background: rgba(232,255,71,0.15); color: var(--accent); }

  /* Drag handle */
  .drag-handle {
    color: var(--muted2);
    cursor: grab;
    padding: 4px 8px 4px 2px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: var(--muted); }

  .exercise-card.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  .exercise-card.dragging {
    opacity: 0.4;
  }

  .ex-body { border-top: 1px solid var(--border); padding: 12px 14px; }

  /* Per-set rows */
  .sets-header {
    display: grid;
    grid-template-columns: 28px 1fr 28px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }

  .sets-header .col-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  .set-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    transition: border-color 0.15s;
  }

  .set-row:focus-within { border-color: var(--muted2); }

  .set-row-top {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .set-input {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    width: 100%;
    text-align: center;
    transition: border-color 0.15s;
  }

  .set-input:focus { outline: none; border-color: var(--accent); }

  .set-del {
    background: none;
    border: none;
    color: var(--muted2);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    transition: color 0.15s;
  }

  .set-del:hover { color: var(--red); }

  /* Per-set weight type pills */
  .set-wt-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .set-wt-pill {
    flex: 1;
    padding: 6px 4px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.3px;
    text-align: center;
    transition: all 0.12s;
  }

  .set-wt-pill.sel-bw  { border-color: var(--blue);    color: var(--blue);    background: rgba(71,180,255,0.12); }
  .set-wt-pill.sel-vest{ border-color: var(--accent2);  color: var(--accent2); background: rgba(255,107,53,0.12); }
  .set-wt-pill.sel-db  { border-color: var(--accent);   color: var(--accent);  background: rgba(232,255,71,0.12); }

  /* Weight input row — full width below pills */
  .set-wt-kg {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 7px;
  }

  .set-kg-input {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: center;
    transition: border-color 0.15s;
    width: 100%;
  }

  .set-kg-input:focus { outline: none; border-color: var(--accent); }

  .set-kg-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .add-set-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 8px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    width: 100%;
    margin-top: 2px;
    transition: all 0.15s;
  }

  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Add exercise button */
  .add-ex-btn {
    width: 100%;
    padding: 14px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .add-ex-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.03); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }

  .modal-input:focus { outline: none; border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  .btn-primary {
    flex: 1;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    flex: 1;
    padding: 13px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    transition: border-color 0.15s;
  }

  .btn-secondary:hover { border-color: var(--muted); }

  /* Day name input */
  .day-name-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    width: 100%;
    margin-bottom: 16px;
  }

  .day-name-input:focus { outline: none; border-color: var(--accent); }

  /* Rest day */
  .rest-day {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .rest-day .rest-icon { font-size: 40px; margin-bottom: 12px; }

  .rest-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    transition: all 0.15s;
    color: var(--muted);
    background: none;
    margin-bottom: 16px;
  }

  .rest-toggle.active { border-color: var(--muted); background: var(--surface2); }

  /* Stats page */
  .stats-header {
    margin-bottom: 24px;
  }

  .big-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .big-stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .big-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--accent);
  }

  .big-stat-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-card-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-card-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .stat-card-val.green { color: var(--green); }
  .stat-card-val.blue { color: var(--blue); }
  .stat-card-val.orange { color: var(--accent2); }

  /* Weekly volume bars */
  .week-bars { margin-bottom: 24px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .bar-day { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 24px; letter-spacing: 1px; }

  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .bar-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 28px; text-align: right; }

  /* Exercise frequency */
  .ex-freq-list { display: flex; flex-direction: column; gap: 8px; }

  .ex-freq-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .ex-freq-name { flex: 1; font-size: 13px; font-weight: 500; }
  .ex-freq-count {
    font-family: 'Bebas Neue', monospace;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .ex-freq-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }

  /* Month selector */
  .month-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .month-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.15s;
  }

  .month-nav:hover { border-color: var(--accent); }

  .month-label {
    flex: 1;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
  }

  /* Progress dots calendar */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 20px;
  }

  .cal-day-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
    padding: 4px 0;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    cursor: default;
    transition: all 0.15s;
  }

  .cal-cell.worked {
    background: rgba(232,255,71,0.12);
    border-color: rgba(232,255,71,0.3);
    color: var(--accent);
  }

  .cal-cell.today {
    border-color: var(--accent);
  }

  .cal-cell.empty { background: none; border-color: transparent; }

  .cal-cell.worked { cursor: pointer; }
  .cal-cell.worked:hover { border-color: var(--accent); background: rgba(232,255,71,0.18); }
  .cal-cell.selected { border-color: var(--accent) !important; background: rgba(232,255,71,0.22) !important; box-shadow: 0 0 0 1px var(--accent); color: var(--accent); }
  .cal-cell.worked.selected { color: #000; background: var(--accent) !important; }

  /* Day detail panel */
  .day-detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
    animation: slideIn 0.2s ease;
  }

  .day-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .day-detail-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .day-detail-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .day-detail-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .day-detail-close:hover { border-color: var(--muted); }

  .day-detail-ex {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .day-detail-ex-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .day-detail-set {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }

  .day-detail-set:last-child { border-bottom: none; }
  .day-detail-set span { color: var(--text); }

  /* Settings page */
  .settings-section { margin-bottom: 24px; }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .settings-row:hover { border-color: var(--muted); }
  .settings-row-label { font-size: 14px; }
  .settings-row-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  /* Toggle switch */
  .toggle {
    width: 36px;
    height: 20px;
    background: var(--muted2);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(16px); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .day-label-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .current-day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    flex: 1;
  }

  .delete-ex-btn {
    background: none;
    border: none;
    color: var(--muted2);

    padding: 0;
    font-size: 13px;
    line-height: 1;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s;

  /* Confirm modal */
  .confirm-modal-overlay {
    display: none;

    inset: 0;
    background: rgba(0,0,0,0.75);

    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .confirm-modal-overlay.open { display: flex; }
  .confirm-modal {
    background: var(--surface);
    border: 1px solid var(--border);

    padding: 24px 20px;
    width: 100%;
    max-width: 340px;

  }
  .confirm-modal-title {
    font-family: 'Bebas Neue', sans-serif;

  .confirm-modal-msg {

    margin-bottom: 20px;
  }
  .confirm-modal-msg strong { color: var(--text); }
  .confirm-modal-btns { display: flex; gap: 10px; }
  .confirm-cancel-btn {

    border: 1px solid var(--border); border-radius: 10px;

  }
  .confirm-cancel-btn:hover { border-color: var(--muted); }
  .confirm-delete-btn {
    flex: 1; padding: 12px; background: var(--red);
    border: none; border-radius: 10px; color: #fff;
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 1px; cursor: pointer; font-weight: 600;
    transition: opacity 0.15s;
  }
  .confirm-delete-btn:hover { opacity: 0.85; }

  .progress-change {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
  }

  .progress-change.up { color: var(--green); background: rgba(71,255,138,0.1); }
  .progress-change.down { color: var(--red); background: rgba(255,68,68,0.1); }

  /* Suggestions */
  .suggestions {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-top: -6px;
    margin-bottom: 10px;
    display: none;
  }

  .suggestion-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface3); }

  /* Workout name input on LOG page */
  .workout-name-input {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 6px 2px 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    transition: border-color 0.15s, color 0.15s;
  }
  .workout-name-input:focus { outline: none; border-color: var(--accent); color: var(--text); }
  .workout-name-input::placeholder { color: var(--muted2); }

  /* Saved session names */
  .session-name-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 18px;
    position: relative;
  }

  .session-name-row .workout-name-input {
    margin-bottom: 0;
    flex: 1;
  }

  .save-name-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .save-name-btn:hover { border-color: var(--accent); color: var(--accent); }

  .saved-names-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 50;
    margin-top: 4px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .saved-names-dropdown.open { display: block; }

  .saved-name-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .saved-name-item:last-child { border-bottom: none; }
  .saved-name-item:hover { background: var(--surface3); }

  .saved-name-text {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .saved-name-del {
    background: none;
    border: none;
    color: var(--muted2);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .saved-name-del:hover { color: var(--red); }

  .saved-names-empty {
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Hide number input spinners everywhere */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }

  /* Vest+DB combo pill */
  .set-wt-pill.sel-combo { border-color: #b47fff; color: #b47fff; background: rgba(180,127,255,0.12); }

  /* Combo expanded weight row */
  .combo-weights {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .combo-field {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
  }
  .combo-field-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .combo-field input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 100%;
    text-align: center;
    outline: none;
  }

  /* Custom rest time picker */
  .rest-custom-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .rest-time-field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .rest-time-field label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
  }
  .rest-time-input {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    width: 100%;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .rest-time-input:focus { border-color: var(--accent); }
  .rest-time-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    padding-top: 18px;
  }
  .rest-set-btn {
    padding: 10px 16px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 18px;
    white-space: nowrap;
  }

  /* ── SESSION PAGE ─────────────────────────────────────── */
  .session-empty {
    text-align: center;
    padding: 60px 20px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    line-height: 2;
  }
  .session-empty-icon { font-size: 44px; margin-bottom: 16px; }
  .start-session-btn {
    display: block; width: 100%; padding: 16px; margin-top: 20px;
    background: var(--accent); border: none; border-radius: 14px;
    color: #000; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: opacity 0.15s;
  }
  .start-session-btn:hover { opacity: 0.9; }
  .session-topbar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;

    border: 1px solid var(--border); border-radius: 14px;
    position: sticky;
    top: 0;
    z-index: 99;
  }
  .session-elapsed-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1.5px; }
  .session-elapsed { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .session-end-btn {
    margin-left: auto; padding: 8px 14px; background: none;
    border: 1px solid var(--red); border-radius: 8px; color: var(--red);
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px;
    cursor: pointer; transition: background 0.15s;
  }
  .session-end-btn:hover { background: rgba(255,68,68,0.1); }
  .rest-timer-bar {
    display: none; position: sticky; top: 90px; z-index: 50;

    align-items: center; gap: 14px;
  }
  .rest-timer-bar.visible { display: flex; }
  .rest-ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .rest-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .rest-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .rest-ring-fg { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .rest-ring-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); letter-spacing: 1px;
  }
  .rest-timer-info { flex: 1; }
  .rest-timer-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 4px; }
  .rest-timer-next { font-size: 13px; font-weight: 600; color: var(--text); }
  .rest-timer-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .rest-skip-btn {
    padding: 8px 12px; background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .rest-skip-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rest-picker {
    display: flex; gap: 6px; margin-bottom: 16px; align-items: center;
  }
  .rest-picker-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1.5px; margin-right: 2px; white-space: nowrap; }
  .rest-opt {
    flex: 1; padding: 7px 4px; background: var(--surface); border: 1px solid var(--border);

  }

  .live-ex-card {

  .session-stat-box .val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--accent); letter-spacing: 1px; line-height: 1; }

</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="https://raw.githubusercontent.com/domnicffs/Workout-Tracker/main/icon.png" alt="FORGE" style="width:38px;height:38px;border-radius:8px;object-fit:cover">
      <div>
        <div class="logo">FORGE<span>WORKOUT TRACKER</span></div>
      </div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)" id="headerDate"></div>
  </div>

  <!-- LOG PAGE -->
  <div class="page active" id="page-log">
    <div class="week-strip" id="weekStrip"></div>

    <div class="day-label-row">
      <div class="current-day-title" id="currentDayTitle">MONDAY</div>
      <button class="rest-toggle" id="restToggle" onclick="toggleRestDay()">🛌 REST DAY</button>
    </div>
    <div class="session-name-row">
      <input class="workout-name-input" id="workoutNameInput" placeholder="Name this session… (e.g. Upper Body)" oninput="updateWorkoutName(this.value)" autocomplete="off">
      <div class="saved-names-dropdown" id="savedNamesDropdown"></div>
      <button class="save-name-btn" onclick="saveCurrentName()" title="Save template">SAVE</button>
      <button class="save-name-btn" onclick="openSavedNames()" title="Load template" style="border-color:var(--blue);color:var(--blue)">LOAD</button>
    </div>

    <div id="dayContent">
      <div class="section-label">
        <span>EXERCISES</span>
        <span id="totalSetsLabel" style="color:var(--accent)"></span>
      </div>

      <div class="exercise-list" id="exerciseList"></div>

      <button class="add-ex-btn" onclick="openAddExercise()">+ ADD EXERCISE</button>
    </div>
  </div><!-- end page-log -->

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div class="section-label" style="margin-bottom:16px">
      <span>THIS WEEK</span>
    </div>

    <div class="stats-grid" id="weekStatsGrid">
      <div class="stat-card">
        <div class="stat-card-label">SESSIONS</div>
        <div class="stat-card-val green" id="statSessions">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">TOTAL SETS</div>
        <div class="stat-card-val blue" id="statSets">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">EXERCISES</div>
        <div class="stat-card-val orange" id="statExercises">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">REST DAYS</div>
        <div class="stat-card-val" id="statRest">0</div>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:12px">VOLUME BY DAY</div>
    <div class="week-bars" id="weekBars"></div>

    <div class="section-label" style="margin-bottom:12px">TOP EXERCISES</div>
    <div class="ex-freq-list" id="exFreqList"></div>
  </div>

  <!-- PROGRESS PAGE -->
  <div class="page" id="page-progress">
    <div class="month-selector">
      <button class="month-nav" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-nav" onclick="changeMonth(1)">›</button>
    </div>

    <div class="big-stat">
      <div class="big-stat-label">WORKOUTS THIS MONTH</div>
      <div class="big-stat-num" id="monthWorkouts">0</div>
      <div class="big-stat-sub" id="monthSubLabel">days logged</div>
    </div>

    <div class="section-label" style="margin-bottom:10px">ACTIVITY CALENDAR</div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="dayDetailPanel"></div>

    <div class="section-label" style="margin-bottom:12px">EXERCISE PROGRESS</div>
    <div id="progressList"></div>
  </div>

  <!-- SESSION PAGE -->
  <div class="page" id="page-session">
    <div id="sessionContent"></div>
  </div>

</div><!-- end app -->

<!-- Bottom Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="switchPage('log', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    LOG
  </button>
  <button class="nav-btn" onclick="switchPage('session', this)" id="navSession">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    SESSION
  </button>
  <button class="nav-btn" onclick="switchPage('stats', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    STATS
  </button>
  <button class="nav-btn" onclick="switchPage('progress', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    PROGRESS
  </button>
</div>

<!-- Add Exercise Modal -->
<div class="modal-overlay" id="addExModal" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">ADD EXERCISE</div>
    <input class="modal-input" id="exNameInput" placeholder="Exercise name (e.g. Pull-ups)" oninput="showSuggestions()" autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('addExModal')">CANCEL</button>
      <button class="btn-primary" onclick="confirmAddExercise()">ADD</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const EXERCISE_SUGGESTIONS = [
  'Pull-ups','Push-ups','Dips','Chin-ups','Inverted Rows',
  'Squats','Lunges','Step-ups','Box Jumps','Bulgarian Split Squats',
  'Pike Push-ups','Handstand Push-ups','Muscle-ups','L-sits','Plank',
  'Bicep Curls','Tricep Extensions','Shoulder Press','Lateral Raises','Chest Press',
  'Deadlifts','Romanian Deadlifts','Hip Thrusts','Glute Bridges','Calf Raises',
  'Bent-over Rows','Chest Flies','Incline Press','Decline Press','Arnold Press',
  'Hammer Curls','Skull Crushers','Face Pulls','Cable Rows','Leg Press',
  'Mountain Climbers','Burpees','Jump Rope','Jumping Jacks','High Knees'
];

// Load from localStorage
let data = JSON.parse(localStorage.getItem('forge_data') || '{}');
// data[dateKey][dayIndex] = { exercises: [{name, sets:[{reps,weight}], weightType, weightVal}], isRest: bool }

let currentDayIndex = 0; // 0=Mon..6=Sun
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const now = new Date();
  // Set current day to today's weekday (0=Sun in JS, convert to 0=Mon)
  currentDayIndex = (now.getDay() + 6) % 7;
  
  document.getElementById('headerDate').textContent = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
  
  renderWeekStrip();
  renderDayContent();
}

function getWeekKey() {
  // Use current week's Monday as key
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek);
  return monday.toISOString().slice(0,10);
}

function getDayData() {
  const wk = getWeekKey();
  if (!data[wk]) data[wk] = {};
  if (!data[wk][currentDayIndex]) data[wk][currentDayIndex] = { exercises: [], isRest: false };
  return data[wk][currentDayIndex];
}

function save() {
  localStorage.setItem('forge_data', JSON.stringify(data));
}

// ─── WEEK STRIP ───────────────────────────────────────────────────────────────
function renderWeekStrip() {
  const strip = document.getElementById('weekStrip');
  const wk = getWeekKey();
  const today = (new Date().getDay() + 6) % 7;
  
  strip.innerHTML = DAYS.map((d, i) => {
    const dayD = data[wk] && data[wk][i];
    const hasWorkout = dayD && !dayD.isRest && dayD.exercises && dayD.exercises.length > 0;
    const isActive = i === currentDayIndex;
    const isToday = i === today;
    
    // Get date number for this day
    const now = new Date();
    const dayOfWeek = (now.getDay() + 6) % 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - dayOfWeek);
    const thisDay = new Date(monday);
    thisDay.setDate(monday.getDate() + i);
    
    return `<div class="day-pill ${hasWorkout?'has-workout':''} ${isActive?'active':''}" onclick="selectDay(${i})">
      <div class="day-name">${d}</div>
      <div class="day-num" style="${isToday?'color:var(--accent2)':''}">${thisDay.getDate()}</div>
      <div class="dot"></div>
    </div>`;
  }).join('');
}

function selectDay(i) {
  currentDayIndex = i;
  renderWeekStrip();
  renderDayContent();
}

// ─── DAY CONTENT ─────────────────────────────────────────────────────────────
function renderDayContent() {
  const dayData = getDayData();
  document.getElementById('currentDayTitle').textContent = DAYS[currentDayIndex];

  const restToggle = document.getElementById('restToggle');
  restToggle.classList.toggle('active', dayData.isRest);

  const nameInput = document.getElementById('workoutNameInput');
  nameInput.value = dayData.workoutName || '';

  const list = document.getElementById('exerciseList');
  
  if (dayData.isRest) {
    list.innerHTML = `<div class="rest-day"><div class="rest-icon">🛌</div>REST DAY</div>`;
    document.getElementById('totalSetsLabel').textContent = '';
    return;
  }
  
  const exercises = dayData.exercises || [];
  let totalSets = 0;
  exercises.forEach(ex => totalSets += (ex.sets || []).length);
  
  document.getElementById('totalSetsLabel').textContent = totalSets > 0 ? `${totalSets} SETS` : '';
  
  if (exercises.length === 0) {
    // Check if same weekday had exercises last week
    const prevWeekData = getPrevWeekDayData(currentDayIndex);
    const prevHint = (prevWeekData && prevWeekData.exercises && prevWeekData.exercises.length > 0)
      ? '<div style="margin-top:12px"><button onclick="copyFromLastWeek()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor=\'var(--accent)\';this.style.color=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--muted)\'">↩ COPY FROM LAST WEEK' + (prevWeekData.workoutName ? ' · ' + prevWeekData.workoutName.toUpperCase() : '') + '</button></div>'
      : '';
    list.innerHTML = '<div class="empty-state">NO EXERCISES LOGGED<br>TAP + TO ADD' + prevHint + '</div>';
    return;
  }
  
  list.innerHTML = exercises.map((ex, ei) => renderExerciseCard(ex, ei)).join('');
}

function renderExerciseCard(ex, ei) {
  const sets = ex.sets || [];

  const setsHtml = sets.map((s, si) => {
    const type = s.type || 'bw';
    const kgVal = s.kg || '';
    const vestKgVal = s.vestKg || '';
    const dbKgVal = s.dbKg || '';

    // Weight area — rendered BELOW pill row
    let weightArea = '';
    if (type === 'vest') {
      weightArea = '<div class="set-wt-kg">'
        + '<input class="set-kg-input" type="number" inputmode="decimal" min="0" step="0.5" value="' + kgVal + '" placeholder="Vest weight"'
        + ' onchange="updateSet(' + ei + ',' + si + ',\'kg\',this.value)">'
        + '<span class="set-kg-label">KG</span></div>';
    } else if (type === 'dumbbell') {
      weightArea = '<div class="set-wt-kg">'
        + '<input class="set-kg-input" type="number" inputmode="decimal" min="0" step="0.5" value="' + kgVal + '" placeholder="Dumbbell weight"'
        + ' onchange="updateSet(' + ei + ',' + si + ',\'kg\',this.value)">'
        + '<span class="set-kg-label">KG</span></div>';
    } else if (type === 'combo') {
      weightArea = '<div class="combo-weights">'
        + '<div class="combo-field"><span class="combo-field-label">VEST</span>'
        + '<input type="number" inputmode="decimal" min="0" step="0.5" value="' + vestKgVal + '" placeholder="0"'
        + ' onchange="updateSet(' + ei + ',' + si + ',\'vestKg\',this.value)">'
        + '<span class="combo-field-label">KG</span></div>'
        + '<div class="combo-field"><span class="combo-field-label">DUMBBELLS</span>'
        + '<input type="number" inputmode="decimal" min="0" step="0.5" value="' + dbKgVal + '" placeholder="0"'
        + ' onchange="updateSet(' + ei + ',' + si + ',\'dbKg\',this.value)">'
        + '<span class="combo-field-label">KG</span></div>'
        + '</div>';
    }

    return '<div class="set-row">'
      + '<div class="set-row-top">'
      + '<div class="set-num">' + (si + 1) + '</div>'
      + '<input class="set-input" type="number" inputmode="numeric" min="0" value="' + (s.reps || '') + '" placeholder="reps" onchange="updateSet(' + ei + ',' + si + ',\'reps\',this.value)">'
      + '<button class="set-del" onclick="deleteSet(' + ei + ',' + si + ')">×</button>'
      + '</div>'
      + '<div class="set-wt-row">'
      + '<button class="set-wt-pill ' + (type === 'bw' ? 'sel-bw' : '') + '" onclick="setSetType(' + ei + ',' + si + ',\'bw\')">BODYWEIGHT</button>'
      + '<button class="set-wt-pill ' + (type === 'vest' || type === 'combo' ? 'sel-vest' : '') + '" onclick="setSetType(' + ei + ',' + si + ',\'vest\')">VEST</button>'
      + '<button class="set-wt-pill ' + (type === 'combo' ? 'sel-combo' : '') + '" onclick="setSetType(' + ei + ',' + si + ',\'combo\')" title="Vest + Dumbbells">+</button>'
      + '<button class="set-wt-pill ' + (type === 'dumbbell' || type === 'combo' ? 'sel-db' : '') + '" onclick="setSetType(' + ei + ',' + si + ',\'dumbbell\')">DUMBBELLS</button>'
      + '</div>'
      + weightArea
      + '</div>';
  }).join('');

  return '<div class="exercise-card" id="excard-' + ei + '" draggable="true" data-ei="' + ei + '" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)" ondragleave="dragLeave(event)">'
    + '<div class="ex-header">'
    + '<div class="drag-handle" onclick="toggleExCard(' + ei + ')" title="Drag to reorder / tap to expand">'
    + '<svg width="16" height="14" viewBox="0 0 16 14" fill="none"><rect x="0" y="0" width="16" height="2" rx="1" fill="currentColor"/><rect x="0" y="6" width="16" height="2" rx="1" fill="currentColor"/><rect x="0" y="12" width="16" height="2" rx="1" fill="currentColor"/></svg>'
    + '</div>'
    + '<div class="ex-name" onclick="toggleExCard(' + ei + ')" style="flex:1;cursor:pointer">' + ex.name + '</div>'
    + '<span class="ex-badge" style="background:var(--surface2);color:var(--muted);font-family:\'DM Mono\',monospace;font-size:10px">' + sets.length + ' SET' + (sets.length !== 1 ? 'S' : '') + '</span>'
    + '<button class="delete-ex-btn" onclick="event.stopPropagation();deleteExercise(' + ei + ')">✕</button>'
    + '</div>'
    + '<div class="ex-body" style="' + (ex._open ? '' : 'display:none') + '">'
    + setsHtml
    + '<button class="add-set-btn" onclick="addSet(' + ei + ')">+ ADD SET</button>'
    + '</div>'
    + '</div>';
}

function toggleExCard(ei) {
  const dayData = getDayData();
  dayData.exercises[ei]._open = !dayData.exercises[ei]._open;
  save();
  renderDayContent();
}

// ─── EXERCISE ACTIONS ─────────────────────────────────────────────────────────
// ─── CONFIRM MODAL ───────────────────────────────────────────────────────────
function showConfirm(message, onConfirm, confirmLabel) {
  document.getElementById('confirmModalMsg').innerHTML = message;
  var btn = document.getElementById('confirmDeleteBtn');
  btn.textContent = confirmLabel || 'DELETE';
  btn.onclick = function() { closeConfirmModal(); onConfirm(); };
  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('open');
}

function deleteExercise(ei) {
  const dayData = getDayData();
  const exName = dayData.exercises[ei] ? dayData.exercises[ei].name : 'this exercise';
  showConfirm('Remove <strong>' + exName + '</strong> from today\'s workout?', function() {
    dayData.exercises.splice(ei, 1);
    save();
    renderDayContent();
    renderWeekStrip();
  });
}

function deleteSet(ei, si) {
  const dayData = getDayData();
  const exName = dayData.exercises[ei] ? dayData.exercises[ei].name : 'this exercise';
  showConfirm('Remove <strong>Set ' + (si + 1) + '</strong> from <strong>' + exName + '</strong>?', function() {
    dayData.exercises[ei].sets.splice(si, 1);
    save();
    renderDayContent();
  });
}

function addSet(ei) {
  const dayData = getDayData();
  const ex = dayData.exercises[ei];
  if (!ex.sets) ex.sets = [];
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({
    reps: last ? last.reps : '',
    type: last ? (last.type || 'bw') : 'bw',
    kg: last ? (last.kg || '') : ''
  });
  save();
  renderDayContent();
}

function updateSet(ei, si, field, val) {
  const dayData = getDayData();
  dayData.exercises[ei].sets[si][field] = val !== '' ? (field === 'reps' ? Number(val) : val) : '';
  save();
  let totalSets = 0;
  dayData.exercises.forEach(ex => totalSets += (ex.sets || []).length);
  document.getElementById('totalSetsLabel').textContent = totalSets > 0 ? `${totalSets} SETS` : '';
}

function setSetType(ei, si, type) {
  const dayData = getDayData();
  dayData.exercises[ei].sets[si].type = type;
  if (type === 'bw') dayData.exercises[ei].sets[si].kg = '';
  save();
  renderDayContent();
}

// kept for compatibility but no longer used globally
function setWeightType(ei, type) {}
function updateExtraWeight(ei, val) {}

function getPrevWeekDayData(dayIndex) {
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek - 7); // go back 7 more days
  const prevWkKey = monday.toISOString().slice(0, 10);
  return (data[prevWkKey] && data[prevWkKey][dayIndex]) || null;
}

function copyFromLastWeek() {
  const prevData = getPrevWeekDayData(currentDayIndex);
  if (!prevData || !prevData.exercises || prevData.exercises.length === 0) return;
  const dayData = getDayData();
  // Copy exercises (deep clone, clear reps so they log fresh)
  dayData.exercises = prevData.exercises.map(function(ex) {
    return {
      name: ex.name,
      _open: false,
      sets: (ex.sets || []).map(function(s) {
        return { reps: '', type: s.type || 'bw', kg: s.kg || '', vestKg: s.vestKg || '', dbKg: s.dbKg || '' };
      })
    };
  });
  // Copy name if current day has none
  if (!dayData.workoutName && prevData.workoutName) {
    dayData.workoutName = prevData.workoutName;
    document.getElementById('workoutNameInput').value = prevData.workoutName;
  }
  save();
  renderDayContent();
  renderWeekStrip();
}

function toggleRestDay() {
  const dayData = getDayData();
  dayData.isRest = !dayData.isRest;
  if (dayData.isRest) dayData.exercises = [];
  save();
  renderDayContent();
  renderWeekStrip();
}

function updateWorkoutName(val) {
  const dayData = getDayData();
  dayData.workoutName = val.trim();
  save();
}

function openSavedNames() {
  renderSavedNamesDropdown('');
}

  {

      { name: 'Mid Incline Push-Ups',sets: [{ reps: 15, type: 'bw', kg: '', vestKg: '', dbKg: '' }] },
      { name: 'Incline Push-Ups',   sets: [{ reps: 15, type: 'bw', kg: '', vestKg: '', dbKg: '' }] },
      { name: 'Dips',               sets: [{ reps: 10, type: 'bw', kg: '', vestKg: '', dbKg: '' }] },

    ]
  }
];

// Seed localStorage with defaults if no templates saved yet
let savedTemplates = JSON.parse(localStorage.getItem('forge_templates') || 'null');
if (!savedTemplates) {
  savedTemplates = DEFAULT_TEMPLATES;
  localStorage.setItem('forge_templates', JSON.stringify(savedTemplates));
}
// Each template: { name, exercises: [{name, sets:[{reps,type,kg,vestKg,dbKg}]}] }

function saveTemplates() {
  localStorage.setItem('forge_templates', JSON.stringify(savedTemplates));
}

function saveCurrentName() {
  const input = document.getElementById('workoutNameInput');
  const val = (input ? input.value : '').trim();
  if (!val) return;

  const dayData = getDayData();
  const exercises = (dayData.exercises || []).map(function(ex) {
    return {
      name: ex.name,
      sets: (ex.sets || []).map(function(s) {
        return { reps: s.reps, type: s.type || 'bw', kg: s.kg || '', vestKg: s.vestKg || '', dbKg: s.dbKg || '' };
      })
    };
  });

  // Update existing template with same name, or add new
  const existingIdx = savedTemplates.findIndex(function(t) { return t.name.toLowerCase() === val.toLowerCase(); });
  if (existingIdx >= 0) {
    savedTemplates[existingIdx] = { name: val, exercises: exercises };
  } else {
    savedTemplates.unshift({ name: val, exercises: exercises });
    if (savedTemplates.length > 30) savedTemplates = savedTemplates.slice(0, 30);
  }
  saveTemplates();

  const btn = document.querySelector('.save-name-btn');
  if (btn) { btn.textContent = '✓ SAVED'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)'; }
  setTimeout(function() {
    if (btn) { btn.textContent = 'SAVE'; btn.style.color = ''; btn.style.borderColor = ''; }
  }, 1200);
  closeSavedNames();
}

function deleteSavedName(i, event) {
  event.stopPropagation();
  const tpl = savedTemplates[i];
  if (!tpl) return;
  showConfirm('Delete the <strong>' + tpl.name + '</strong> template? This can\'t be undone.', function() {
    savedTemplates.splice(i, 1);
    saveTemplates();
    renderSavedNamesDropdown('');
  });
}

function pickSavedName(idx) {
  const tpl = savedTemplates[idx];
  if (!tpl) return;

  const dayData = getDayData();
  // Apply name
  dayData.workoutName = tpl.name;
  const input = document.getElementById('workoutNameInput');
  if (input) input.value = tpl.name;

  // Apply exercises — deep clone, open first one
  dayData.exercises = tpl.exercises.map(function(ex, i) {
    return {
      name: ex.name,
      _open: i === 0,
      sets: (ex.sets || []).map(function(s) {
        return { reps: s.reps, type: s.type || 'bw', kg: s.kg || '', vestKg: s.vestKg || '', dbKg: s.dbKg || '' };
      })
    };
  });

  save();
  closeSavedNames();
  renderDayContent();
  renderWeekStrip();
}

function openSavedNames() {
  renderSavedNamesDropdown('');
}

function renderSavedNamesDropdown(filter) {
  const dd = document.getElementById('savedNamesDropdown');
  if (!dd) return;
  // Always re-read from localStorage to stay in sync
  savedTemplates = JSON.parse(localStorage.getItem('forge_templates') || '[]');
  const list = filter
    ? savedTemplates.filter(function(t) { return t.name.toLowerCase().includes(filter.toLowerCase()); })
    : savedTemplates;

  if (list.length === 0) {
    dd.innerHTML = '<div class="saved-names-empty">'
      + (savedTemplates.length === 0
        ? 'NO TEMPLATES YET · ADD EXERCISES &amp; HIT SAVE'
        : 'NO MATCHES')
      + '</div>';
  } else {
    dd.innerHTML = list.map(function(tpl) {
      const realIdx = savedTemplates.indexOf(tpl);
      const exCount = (tpl.exercises || []).length;
      const exNames = (tpl.exercises || []).slice(0, 3).map(function(e) { return e.name; }).join(', ')
        + (exCount > 3 ? ' +' + (exCount - 3) + ' more' : '');
      return '<div class="saved-name-item" onclick="pickSavedName(' + realIdx + ')">'
        + '<div style="flex:1;min-width:0">'
        + '<div class="saved-name-text">' + tpl.name + '</div>'
        + '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
        + exCount + ' EXERCISE' + (exCount !== 1 ? 'S' : '') + (exNames ? ' · ' + exNames : '')
        + '</div></div>'
        + '<button class="saved-name-del" onclick="deleteSavedName(' + realIdx + ', event)">✕</button>'
        + '</div>';
    }).join('');
  }
  dd.classList.add('open');
}

function closeSavedNames() {
  const dd = document.getElementById('savedNamesDropdown');
  if (dd) dd.classList.remove('open');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.session-name-row')) closeSavedNames();
});

// ─── ADD EXERCISE MODAL ───────────────────────────────────────────────────────
function openAddExercise() {
  document.getElementById('exNameInput').value = '';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('addExModal').classList.add('open');
  setTimeout(() => document.getElementById('exNameInput').focus(), 100);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function closeModalIfOutside(e) {
  if (e.target === e.currentTarget) closeModal('addExModal');
}

function showSuggestions() {
  const val = document.getElementById('exNameInput').value.toLowerCase();
  const sug = document.getElementById('suggestions');
  if (!val) { sug.style.display = 'none'; return; }
  
  const matches = EXERCISE_SUGGESTIONS.filter(s => s.toLowerCase().includes(val)).slice(0, 5);
  if (matches.length === 0) { sug.style.display = 'none'; return; }
  
  sug.style.display = 'block';
  sug.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectSuggestion('${m}')">${m}</div>`).join('');
}

function selectSuggestion(name) {
  document.getElementById('exNameInput').value = name;
  document.getElementById('suggestions').style.display = 'none';
}

function confirmAddExercise() {
  const name = document.getElementById('exNameInput').value.trim();
  if (!name) return;
  
  const dayData = getDayData();
  dayData.exercises.push({ name, sets: [{ reps: '', type: 'bw', kg: '' }], _open: true });
  save();
  closeModal('addExModal');
  renderDayContent();
  renderWeekStrip();
}

// Enter key in modal
document.getElementById('exNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddExercise();
});

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const wk = getWeekKey();
  const wkData = data[wk] || {};
  
  let sessions = 0, totalSets = 0, uniqueEx = new Set(), restDays = 0;
  const exCounts = {};
  const volByDay = DAYS.map(() => 0);
  
  for (let i = 0; i < 7; i++) {
    const d = wkData[i];
    if (!d) continue;
    if (d.isRest) { restDays++; continue; }
    if (!d.exercises || d.exercises.length === 0) continue;
    sessions++;
    d.exercises.forEach(ex => {
      uniqueEx.add(ex.name);
      const s = (ex.sets || []).length;
      totalSets += s;
      volByDay[i] += s;
      exCounts[ex.name] = (exCounts[ex.name] || 0) + s;
    });
  }
  
  document.getElementById('statSessions').textContent = sessions;
  document.getElementById('statSets').textContent = totalSets;
  document.getElementById('statExercises').textContent = uniqueEx.size;
  document.getElementById('statRest').textContent = restDays;
  
  // Volume bars
  const maxVol = Math.max(...volByDay, 1);
  document.getElementById('weekBars').innerHTML = DAYS.map((d, i) => `
    <div class="bar-row">
      <div class="bar-day">${d}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(volByDay[i]/maxVol)*100}%"></div></div>
      <div class="bar-val">${volByDay[i] || '—'}</div>
    </div>
  `).join('');
  
  // Top exercises
  const sorted = Object.entries(exCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
  if (sorted.length === 0) {
    document.getElementById('exFreqList').innerHTML = `<div class="empty-state">NO EXERCISES THIS WEEK</div>`;
  } else {
    document.getElementById('exFreqList').innerHTML = sorted.map(([name, count]) => `
      <div class="ex-freq-item">
        <div class="ex-freq-name">${name}</div>
        <div>
          <div class="ex-freq-count">${count}</div>
          <div class="ex-freq-label">SETS</div>
        </div>
      </div>
    `).join('');
  }
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth] + ' ' + currentYear;

  let monthWorkouts = 0;
  const workedDays = new Set();
  const workedDaysData = {}; // date number → {workoutName, exercises}

  Object.entries(data).forEach(function([wkKey, wkData]) {
    const monday = new Date(wkKey);
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
        const dayD = wkData[i];
        if (dayD && !dayD.isRest && dayD.exercises && dayD.exercises.length > 0) {
          monthWorkouts++;
          workedDays.add(d.getDate());
          workedDaysData[d.getDate()] = {
            workoutName: dayD.workoutName || '',
            exercises: dayD.exercises
          };
        }
      }
    }
  });

  document.getElementById('monthWorkouts').textContent = monthWorkouts;
  document.getElementById('monthSubLabel').textContent = 'of ' + daysInMonth(currentMonth, currentYear) + ' days';

  renderCalendar(workedDays, workedDaysData);
  renderExerciseProgress();
}

function daysInMonth(month, year) {
  return new Date(year, month + 1, 0).getDate();
}

let selectedCalDay = null;

function renderCalendar(workedDays, workedDaysData) {
  const cal = document.getElementById('calGrid');
  const firstDay = new Date(currentYear, currentMonth, 1);
  const startDow = (firstDay.getDay() + 6) % 7;
  const total = daysInMonth(currentMonth, currentYear);
  const today = new Date();

  let html = DAYS.map(function(d) { return '<div class="cal-day-label">' + d[0] + '</div>'; }).join('');

  for (let i = 0; i < startDow; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= total; d++) {
    const isToday = today.getDate() === d && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
    const worked = workedDays.has(d);
    const isSelected = selectedCalDay === d;
    // All days clickable
    html += '<div class="cal-cell ' + (worked ? 'worked' : '') + ' ' + (isToday ? 'today' : '') + ' ' + (isSelected ? 'selected' : '') + '" onclick="showDayDetail(' + d + ')" style="cursor:pointer">' + d + '</div>';
  }

  cal.innerHTML = html;
  cal._workedDaysData = workedDaysData;

  if (selectedCalDay) {
    renderDayDetailPanel(selectedCalDay, workedDaysData[selectedCalDay] || null);
  } else {
    document.getElementById('dayDetailPanel').innerHTML = '';
  }
}

function showDayDetail(day) {
  const cal = document.getElementById('calGrid');
  const workedDaysData = cal._workedDaysData || {};

  // Toggle off if same day tapped again
  if (selectedCalDay === day) {
    selectedCalDay = null;
    document.getElementById('dayDetailPanel').innerHTML = '';
    cal.querySelectorAll('.cal-cell.selected').forEach(function(c) { c.classList.remove('selected'); });
    return;
  }

  selectedCalDay = day;

  cal.querySelectorAll('.cal-cell').forEach(function(c) { c.classList.remove('selected'); });
  cal.querySelectorAll('.cal-cell').forEach(function(c) {
    if (parseInt(c.textContent) === day) c.classList.add('selected');
  });

  renderDayDetailPanel(day, workedDaysData[day] || null);
}

function renderDayDetailPanel(day, dayData) {
  const panel = document.getElementById('dayDetailPanel');
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr = day + ' ' + monthNames[currentMonth] + ' ' + currentYear;

  window._detailDayData = dayData;
  window._detailDay = day;

  const hasName = dayData && dayData.workoutName && dayData.workoutName.trim();
  const hasExercises = dayData && dayData.exercises && dayData.exercises.length > 0;

  const exBlocks = hasExercises ? (dayData.exercises || []).map(function(ex) {
    const sets = (ex.sets || []).map(function(s, si) {
      const type = s.type || 'bw';
      const weightStr = type === 'vest' ? (s.kg || 0) + 'kg Vest'
                      : type === 'dumbbell' ? (s.kg || 0) + 'kg Dumbbells'
                      : type === 'combo' ? (s.vestKg || 0) + 'kg Vest + ' + (s.dbKg || 0) + 'kg Dumbbells'
                      : 'Bodyweight';
      return '<div class="day-detail-set">SET ' + (si + 1) + ' · <span>' + (s.reps || '—') + ' reps</span> · ' + weightStr + '</div>';
    }).join('');
    return '<div class="day-detail-ex"><div class="day-detail-ex-name">' + ex.name + '</div>' + sets + '</div>';
  }).join('') : '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);padding:10px 0;letter-spacing:1px">NO WORKOUT LOGGED · LOAD A TEMPLATE BELOW</div>';

  const actionBtns = '<div style="display:flex;gap:8px;align-items:center">'
    + (hasExercises ? '<button class="save-name-btn" onclick="saveFromDayDetail()" style="font-size:9px;padding:5px 10px" title="Save as template">SAVE TEMPLATE</button>' : '')
    + '<button class="save-name-btn" onclick="toggleDetailLoadDropdown()" style="font-size:9px;padding:5px 10px;border-color:var(--blue);color:var(--blue)" title="Load template">LOAD TEMPLATE</button>'
    + '<button class="day-detail-close" onclick="showDayDetail(' + day + ')">✕</button>'
    + '</div>';

  panel.innerHTML = '<div class="day-detail-panel">'
    + '<div class="day-detail-header">'
    + '<div><div class="day-detail-date">' + dateStr + '</div>'
    + (hasName ? '<div class="day-detail-name">' + dayData.workoutName.toUpperCase() + '</div>' : '')
    + '</div>'
    + actionBtns
    + '</div>'
    + '<div id="detailLoadDropdown" style="display:none;margin-bottom:12px"></div>'
    + exBlocks
    + '</div>';
}

function toggleDetailLoadDropdown() {
  const dd = document.getElementById('detailLoadDropdown');
  if (!dd) return;
  if (dd.style.display !== 'none') { dd.style.display = 'none'; return; }

  savedTemplates = JSON.parse(localStorage.getItem('forge_templates') || '[]');
  if (savedTemplates.length === 0) {
    dd.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);padding:8px 0;letter-spacing:1px">NO SAVED TEMPLATES</div>';
  } else {
    dd.innerHTML = savedTemplates.map(function(tpl, idx) {
      const exCount = (tpl.exercises || []).length;
      return '<div class="saved-name-item" onclick="loadTemplateIntoPastDay(' + idx + ')" style="border-radius:8px;margin-bottom:4px;background:var(--surface2);border:1px solid var(--border)">'
        + '<div style="flex:1">'
        + '<div class="saved-name-text">' + tpl.name + '</div>'
        + '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);margin-top:2px">' + exCount + ' EXERCISE' + (exCount !== 1 ? 'S' : '') + '</div>'
        + '</div>'
        + '</div>';
    }).join('');
  }
  dd.style.display = 'block';
}

function loadTemplateIntoPastDay(tplIdx) {
  const tpl = savedTemplates[tplIdx];
  if (!tpl) return;

  const day = window._detailDay;
  // Find which week key this day belongs to
  const targetDate = new Date(currentYear, currentMonth, day);
  const dow = (targetDate.getDay() + 6) % 7; // 0=Mon
  const monday = new Date(targetDate);
  monday.setDate(targetDate.getDate() - dow);
  const wkKey = monday.toISOString().slice(0, 10);

  if (!data[wkKey]) data[wkKey] = {};
  if (!data[wkKey][dow]) data[wkKey][dow] = {};

  data[wkKey][dow].workoutName = tpl.name;
  data[wkKey][dow].exercises = tpl.exercises.map(function(ex, i) {
    return {
      name: ex.name,
      _open: i === 0,
      sets: (ex.sets || []).map(function(s) {
        return { reps: s.reps, type: s.type || 'bw', kg: s.kg || '', vestKg: s.vestKg || '', dbKg: s.dbKg || '' };
      })
    };
  });
  data[wkKey][dow].isRest = false;
  save();

  // Refresh the progress view
  selectedCalDay = day;
  renderProgress();
}

function saveFromDayDetail() {
  const dayData = window._detailDayData;
  if (!dayData || !dayData.exercises || dayData.exercises.length === 0) return;

  const name = (dayData.workoutName || '').trim() || ('Session ' + new Date().toLocaleDateString('en-GB'));
  const exercises = dayData.exercises.map(function(ex) {
    return {
      name: ex.name,
      sets: (ex.sets || []).map(function(s) {
        return { reps: s.reps, type: s.type || 'bw', kg: s.kg || '', vestKg: s.vestKg || '', dbKg: s.dbKg || '' };
      })
    };
  });

  savedTemplates = JSON.parse(localStorage.getItem('forge_templates') || '[]');
  const existingIdx = savedTemplates.findIndex(function(t) { return t.name.toLowerCase() === name.toLowerCase(); });
  if (existingIdx >= 0) {
    savedTemplates[existingIdx] = { name: name, exercises: exercises };
  } else {
    savedTemplates.unshift({ name: name, exercises: exercises });
    if (savedTemplates.length > 30) savedTemplates = savedTemplates.slice(0, 30);
  }
  saveTemplates();

  // Feedback on the button
  var btn = document.querySelector('.day-detail-panel .save-name-btn');
  if (btn) {
    btn.textContent = '✓ SAVED';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(function() {
      btn.textContent = 'SAVE TEMPLATE';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 1500);
  }
}

function renderExerciseProgress() {
  const exProgress = {};

  Object.entries(data).forEach(([wkKey, wkData]) => {
    const monday = new Date(wkKey);
    const wkTs = monday.getTime();
    Object.values(wkData).forEach(dayD => {
      if (!dayD || dayD.isRest || !dayD.exercises) return;
      dayD.exercises.forEach(ex => {
        if (!exProgress[ex.name]) exProgress[ex.name] = [];
        const maxReps = Math.max(...(ex.sets||[]).map(s => Number(s.reps)||0), 0);
        exProgress[ex.name].push({ ts: wkTs, maxReps });
      });
    });
  });

  const container = document.getElementById('progressList');
  const entries = Object.entries(exProgress);

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state">START LOGGING TO SEE PROGRESS</div>';
    return;
  }

  container.innerHTML = entries.map(([name, records]) => {
    if (records.length < 1) return '';
    const sorted = records.sort((a,b) => a.ts - b.ts);

    // Best reps ever
    const bestReps = Math.max(...sorted.map(r => r.maxReps));
    // Best reps excluding the most recent session (to show improvement)
    const prevBest = sorted.length > 1
      ? Math.max(...sorted.slice(0, -1).map(r => r.maxReps))
      : null;

    let changeHtml = '';
    if (prevBest !== null && bestReps > 0 && prevBest > 0) {
      const diff = bestReps - prevBest;
      if (diff > 0) changeHtml = '<span class="progress-change up">+' + diff + ' REPS</span>';
      // Only show negative if it genuinely went down from a valid prev best
    }

    return '<div class="ex-freq-item" style="margin-bottom:8px">'
      + '<div style="flex:1">'
      + '<div class="ex-freq-name">' + name + ' ' + changeHtml + '</div>'
      + '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);margin-top:4px">'
      + 'BEST: ' + (bestReps || '—') + ' REPS · ' + records.length + ' SESSION' + (records.length > 1 ? 'S' : '')
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  selectedCalDay = null;
  renderProgress();
}

let session = {
  active: false,
  startTs: null,
  elapsedTimer: null,
  restTimer: null,
  restDuration: 90,
  restRemaining: 0,
  pendingRestDuration: null,
  setsDone: {},
